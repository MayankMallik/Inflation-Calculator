<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2><center>Inflation Calculator</center></h2>
        
        <div class="input-group">
            <label for="principal">Current Cost (₹)</label>
            <input type="text" id="principal" inputmode="numeric" placeholder="e.g. 1,00,000">
        </div>

        <div class="input-group">
            <label for="rate">Inflation Rate (% per annum)</label>
            <input type="text" id="rate" inputmode="numeric" placeholder="e.g. 12">
        </div>

        <div class="input-group">
            <label for="years">Time Period (in Years)</label>
            <input type="text" id="years" inputmode="numeric" placeholder="e.g. 10">
        </div>

        <button onclick="calculateInflation()"><b>Calculate</b></button>

        <div class="results" id="results" style="display: none;">
            <div class="result-item">
                <span>Current Cost:</span>
                <span id="invested">₹0</span>
            </div>
            <div class="result-item">
                <span>Increase in Cost:</span>
                <span id="returns">₹0</span>
            </div>
            <div class="result-item total">
                <span>Future Cost:</span>
                <span id="total">₹0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
